<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Azhar Khan — Omnitrix Portfolio</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;800;900&family=Rajdhani:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<style>
/* ═══════════════════════════════════════════
   RESET + VARIABLES
═══════════════════════════════════════════ */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --g:     #00ff41;
  --g2:    #00cc33;
  --g3:    #006618;
  --g4:    #003310;
  --g5:    #001a08;
  --black: #010802;
  --font-d: 'Orbitron', monospace;
  --font-b: 'Rajdhani', sans-serif;
}
html, body {
  width: 100%; height: 100%;
  background: var(--black);
  color: var(--g);
  font-family: var(--font-b);
  overflow: hidden;
  cursor: none;
}
::selection { background: var(--g); color: #000; }
::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-thumb { background: var(--g3); border-radius: 2px; }

/* ═══════════════════════════════════════════
   CUSTOM CURSOR
═══════════════════════════════════════════ */
#cur-d, #cur-r {
  position: fixed; pointer-events: none; z-index: 9999;
  border-radius: 50%; transform: translate(-50%,-50%);
}
#cur-d { width: 8px; height: 8px; background: var(--g); top: 0; left: 0; }
#cur-r {
  width: 32px; height: 32px;
  border: 1.5px solid rgba(0,255,65,0.6); top: 0; left: 0;
  transition: width .25s, height .25s, border-color .25s;
}

/* ═══════════════════════════════════════════
   BACKGROUND — HEX DOT GRID
═══════════════════════════════════════════ */
#hex-bg {
  position: fixed; inset: 0; z-index: 0;
  background: radial-gradient(ellipse at 50% 50%, #061206 0%, #010802 65%);
}
#hex-bg::after {
  content: '';
  position: absolute; inset: 0;
  background-image: radial-gradient(circle, rgba(0,255,65,0.07) 1.5px, transparent 1.5px);
  background-size: 30px 30px;
  animation: hexPulse 6s ease-in-out infinite;
}
@keyframes hexPulse {
  0%,100% { opacity: 0.7; } 50% { opacity: 1; }
}

/* SCANLINES */
#scanlines {
  position: fixed; inset: 0; z-index: 9000; pointer-events: none;
  background: repeating-linear-gradient(0deg,
    transparent, transparent 3px,
    rgba(0,255,65,0.018) 3px, rgba(0,255,65,0.018) 4px);
}

/* CANVAS particles */
#pcanvas { position: fixed; inset: 0; z-index: 1; pointer-events: none; }

/* ═══════════════════════════════════════════
   SCREENS
═══════════════════════════════════════════ */
.screen {
  position: fixed; inset: 0; z-index: 10;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  transition: opacity .5s ease;
}
.screen.hidden { opacity: 0; pointer-events: none; }

/* ═══════════════════════════════════════════
   SELECTOR SCREEN
═══════════════════════════════════════════ */
#sel-screen { gap: 16px; }

.ptitle {
  font-family: var(--font-d);
  font-size: clamp(18px, 3.2vw, 34px);
  font-weight: 900; letter-spacing: 5px;
  color: var(--g); text-align: center;
  text-shadow: 0 0 20px var(--g), 0 0 50px rgba(0,255,65,0.25);
  animation: titlePulse 4s ease-in-out infinite;
}
@keyframes titlePulse {
  0%,100% { text-shadow: 0 0 18px var(--g), 0 0 40px rgba(0,255,65,0.2); }
  50%      { text-shadow: 0 0 30px var(--g), 0 0 70px rgba(0,255,65,0.4); }
}
.psub {
  font-family: var(--font-b);
  font-size: clamp(10px, 1.3vw, 13px);
  color: rgba(0,255,65,0.4); letter-spacing: 4px; text-align: center;
  text-transform: uppercase;
}

/* ═══════════════════════════════════════════
   OMNITRIX 3D CONTAINER
═══════════════════════════════════════════ */
#omni3d {
  position: relative;
  width: 520px; height: 520px;
  flex-shrink: 0;
  transform-style: preserve-3d;
  transition: transform .12s ease-out;
  user-select: none;
}

/* OUTER DECORATIVE RING (SVG, slowly spins) */
#outer-ring-svg {
  position: absolute; inset: 0; width: 100%; height: 100%;
  animation: spinRing 25s linear infinite;
  pointer-events: none;
}
@keyframes spinRing { to { transform: rotate(360deg); } }

/* SECONDARY INNER RING (counter-spin) */
#inner-ring-svg {
  position: absolute; inset: 0; width: 100%; height: 100%;
  animation: spinRing 15s linear infinite reverse;
  pointer-events: none;
}

/* ═══════════════════════════════════════════
   ALIEN HEX BUTTONS
═══════════════════════════════════════════ */
.alien-btn {
  position: absolute;
  width: 84px; height: 84px;
  background: rgba(0,10,2,0.9);
  border: 2px solid rgba(0,255,65,0.3);
  cursor: none; outline: none;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center; gap: 3px;
  clip-path: polygon(50% 0%,100% 25%,100% 75%,50% 100%,0% 75%,0% 25%);
  transition: border-color .3s, box-shadow .3s, transform .3s;
  overflow: hidden; z-index: 6;
}
.alien-btn::before {
  content: ''; position: absolute; inset: 0;
  background: radial-gradient(circle at 50% 50%, rgba(0,255,65,0.15), transparent 70%);
  opacity: 0; transition: opacity .3s;
}
.alien-btn:hover {
  border-color: var(--g);
  box-shadow: 0 0 18px rgba(0,255,65,0.6), 0 0 40px rgba(0,255,65,0.25);
  transform: translate(var(--tx), var(--ty)) scale(1.15);
}
.alien-btn:hover::before { opacity: 1; }
.alien-btn .a-emoji { font-size: 24px; position: relative; z-index: 1; line-height: 1; }
.alien-btn .a-section {
  font-family: var(--font-d); font-size: 7px; letter-spacing: 1px;
  color: var(--g); position: relative; z-index: 1;
  text-transform: uppercase; text-align: center; line-height: 1.2;
}
.alien-btn .a-alien {
  font-size: 5.5px; color: rgba(0,255,65,0.35); letter-spacing: .5px;
  font-family: var(--font-d); position: relative; z-index: 1; text-align: center;
}

/* Hardcoded positions for 520px container, radius 200px */
/* Center of container = 260,260 */
/* btn half = 42px */
.alien-btn:nth-of-type(1) { 
  top: 18px; left: 218px;
  --tx: 0px; --ty: -6px;
}

.alien-btn:nth-of-type(2) {
  top: 118px; left: 391px;
  --tx: 6px; --ty: -6px;
}

.alien-btn:nth-of-type(3) {
  top: 318px; left: 391px;
  --tx: 6px; --ty: 6px;
}

.alien-btn:nth-of-type(4) {
  top: 418px; left: 218px;
  --tx: 0px; --ty: 6px;
}

.alien-btn:nth-of-type(5) {
  top: 318px; left: 46px;
  --tx: -6px; --ty: 6px;
}

.alien-btn:nth-of-type(6) {
  top: 118px; left: 46px;
  --tx: -6px; --ty: -6px;
}

/* ═══════════════════════════════════════════
   WATCH FACE
═══════════════════════════════════════════ */
#watch-face {
  position: absolute;
  left: 50%; top: 50%;
  width: 262px; height: 262px;
  transform: translate(-50%, -50%);
  border-radius: 50%;
  background: radial-gradient(circle at 38% 32%, #0a2a08 0%, #030f03 50%, #010601 100%);
  border: 5px solid #0d2a0d;
  box-shadow:
    0 0 0 2px #030f03,
    0 0 0 6px #0d2a0d,
    0 0 0 7px rgba(0,255,65,0.1),
    0 0 40px rgba(0,255,65,0.45),
    0 0 80px rgba(0,255,65,0.15),
    0 0 130px rgba(0,255,65,0.06),
    inset 0 0 60px rgba(0,0,0,0.75),
    inset 0 1px 3px rgba(0,255,65,0.2);
  display: flex; align-items: center; justify-content: center;
  flex-direction: column; gap: 6px;
  z-index: 5;
  transition: box-shadow .4s ease;
  animation: facePulse 4s ease-in-out infinite;
}
@keyframes facePulse {
  0%,100% { box-shadow: 0 0 0 2px #030f03, 0 0 0 6px #0d2a0d, 0 0 0 7px rgba(0,255,65,.08), 0 0 35px rgba(0,255,65,.4), 0 0 70px rgba(0,255,65,.12), inset 0 0 60px rgba(0,0,0,.75), inset 0 1px 3px rgba(0,255,65,.18); }
  50%      { box-shadow: 0 0 0 2px #030f03, 0 0 0 6px #0d2a0d, 0 0 0 7px rgba(0,255,65,.15), 0 0 55px rgba(0,255,65,.6), 0 0 110px rgba(0,255,65,.2), inset 0 0 50px rgba(0,0,0,.6), inset 0 1px 4px rgba(0,255,65,.3); }
}
#watch-face.mega-glow {
  animation: none;
  box-shadow:
    0 0 0 2px #050f05,
    0 0 0 6px #1a5a1a,
    0 0 0 10px rgba(0,255,65,0.3),
    0 0 80px rgba(0,255,65,0.95),
    0 0 160px rgba(0,255,65,0.5),
    0 0 240px rgba(0,255,65,0.25),
    inset 0 0 40px rgba(0,255,65,0.1);
}

/* Inner decorative rings */
#watch-face::before {
  content: ''; position: absolute;
  width: 232px; height: 232px; border-radius: 50%;
  border: 1px solid rgba(0,255,65,0.12); pointer-events: none;
}
#watch-face::after {
  content: ''; position: absolute;
  width: 200px; height: 200px; border-radius: 50%;
  border: 1px solid rgba(0,255,65,0.06); pointer-events: none;
}

/* HOURGLASS SVG */
#hourglass-svg {
  width: 72px; height: 88px;
  filter: drop-shadow(0 0 10px var(--g)) drop-shadow(0 0 24px rgba(0,255,65,.5));
  animation: hgPulse 3s ease-in-out infinite;
  position: relative; z-index: 2;
}
@keyframes hgPulse {
  0%,100% { filter: drop-shadow(0 0 8px var(--g)) drop-shadow(0 0 18px rgba(0,255,65,.4)); }
  50%      { filter: drop-shadow(0 0 18px var(--g)) drop-shadow(0 0 36px rgba(0,255,65,.7)); }
}

#face-alien-name {
  font-family: var(--font-d); font-size: 8.5px; letter-spacing: 2.5px;
  color: rgba(0,255,65,0.4); text-transform: uppercase;
  text-align: center; position: relative; z-index: 2;
  transition: color .3s, text-shadow .3s; line-height: 1.4;
  min-height: 22px;
}
#face-alien-name.lit {
  color: var(--g);
  text-shadow: 0 0 12px var(--g);
}

/* WATCH BAND */
.band {
  position: absolute; left: 50%; width: 58px; height: 32px;
  background: linear-gradient(to bottom, #0a1a0a, #050f05);
  border: 1px solid #1a3a1a;
}
.band-top { top: 0; transform: translateX(-50%) translateY(-29px); border-radius: 6px 6px 0 0; }
.band-bottom { bottom: 0; transform: translateX(-50%) translateY(29px); border-radius: 0 0 6px 6px; }
.band::after {
  content: ''; position: absolute; left: 50%; top: 50%;
  transform: translate(-50%,-50%);
  width: 40px; height: 3px;
  background: rgba(0,255,65,0.15);
  border-radius: 2px;
}

/* ═══════════════════════════════════════════
   SELECT HINT
═══════════════════════════════════════════ */
#sel-hint {
  font-family: var(--font-d); font-size: 9.5px; letter-spacing: 5px;
  color: rgba(0,255,65,0.3); text-transform: uppercase; text-align: center;
  animation: hintBlink 2.5s ease-in-out infinite;
}
@keyframes hintBlink {
  0%,100% { opacity: .3; } 60% { opacity: .7; }
}

/* ═══════════════════════════════════════════
   TRANSFORMATION OVERLAY
═══════════════════════════════════════════ */
#transform-overlay {
  position: fixed; inset: 0; z-index: 800;
  background: var(--g);
  opacity: 0; pointer-events: none;
  display: flex; align-items: center; justify-content: center;
  flex-direction: column; gap: 20px;
}
#transform-overlay.go {
  pointer-events: all;
  animation: flashAnim 1.6s forwards;
}
@keyframes flashAnim {
  0%   { opacity: 0; }
  10%  { opacity: 1; }
  55%  { opacity: 1; }
  100% { opacity: 0; }
}
.hero-time {
  font-family: var(--font-d); font-weight: 900; color: #000;
  font-size: clamp(22px, 5.5vw, 60px); letter-spacing: 6px; text-align: center;
  opacity: 0; transform: scale(0.6);
}
#transform-overlay.go .hero-time {
  animation: heroTimeAnim 1.6s forwards;
}
@keyframes heroTimeAnim {
  0%   { opacity: 0; transform: scale(.6); }
  18%  { opacity: 1; transform: scale(1.05); }
  50%  { opacity: 1; transform: scale(1); }
  80%  { opacity: 1; }
  100% { opacity: 0; transform: scale(1.15); }
}
.transform-alien-name {
  font-family: var(--font-d); font-weight: 700; color: rgba(0,0,0,0.5);
  font-size: clamp(13px, 2.5vw, 22px); letter-spacing: 8px;
  text-transform: uppercase; opacity: 0;
}
#transform-overlay.go .transform-alien-name {
  animation: heroTimeAnim 1.6s .1s forwards;
}
/* energy rings in overlay */
.t-ring {
  position: absolute; border-radius: 50%;
  border: 2px solid rgba(0,0,0,0.15);
  opacity: 0;
}
#transform-overlay.go .t-ring { animation: ringExpand 1.6s forwards; }
#transform-overlay.go .t-ring:nth-child(1) { animation-delay: 0.0s; }
#transform-overlay.go .t-ring:nth-child(2) { animation-delay: 0.15s; }
#transform-overlay.go .t-ring:nth-child(3) { animation-delay: 0.3s; }
@keyframes ringExpand {
  0%   { width: 60px; height: 60px; opacity: .6; top: 50%; left: 50%; transform: translate(-50%,-50%); }
  100% { width: 200vmax; height: 200vmax; opacity: 0; top: 50%; left: 50%; transform: translate(-50%,-50%); }
}

/* ═══════════════════════════════════════════
   CONTENT SCREEN
═══════════════════════════════════════════ */
#content-screen {
  overflow-y: auto; overflow-x: hidden;
  flex-direction: column; align-items: stretch;
  z-index: 100;
}
#content-screen:not(.hidden) { overflow-y: auto; }

/* content bg */
.c-bg {
  position: fixed; inset: 0; z-index: -1;
  background: #010902;
  background-image: radial-gradient(ellipse at 50% 0%, #062006 0%, #010802 55%);
}
.c-bg::after {
  content: ''; position: absolute; inset: 0;
  background-image: radial-gradient(circle, rgba(0,255,65,0.045) 1.5px, transparent 1.5px);
  background-size: 28px 28px;
}

/* CONTENT HEADER */
#c-header {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  z-index: 200;

  background: rgba(1,9,2,0.93);
  backdrop-filter: blur(20px);
  border-bottom: 1px solid rgba(0,255,65,0.18);

  padding: 14px 48px;
  display: flex;
  align-items: center;
  gap: 18px;
}
#c-header-omni svg {
  width: 42px; height: 42px;
  filter: drop-shadow(0 0 8px var(--g));
  flex-shrink: 0;
}
.c-header-text { flex: 1; }
#c-alien-label {
  font-family: var(--font-d); font-size: 8px; letter-spacing: 3px;
  color: rgba(0,255,65,0.35); text-transform: uppercase; margin-bottom: 2px;
}
#c-section-title {
  font-family: var(--font-d); font-size: clamp(16px, 2.8vw, 28px);
  font-weight: 800; color: var(--g); letter-spacing: 2px;
  text-shadow: 0 0 20px rgba(0,255,65,0.35);
}
#deact-btn {
  font-family: var(--font-d); font-size: 10px; letter-spacing: 2.5px;
  text-transform: uppercase; padding: 10px 22px;
  background: transparent; border: 1px solid rgba(255,60,60,0.5);
  color: rgba(255,80,80,0.75); cursor: none;
  transition: all .25s;
  clip-path: polygon(0 0, calc(100% - 10px) 0, 100% 10px, 100% 100%, 0 100%);
}
#deact-btn:hover {
  background: rgba(255,50,50,0.08); border-color: #ff5050;
  color: #ff5050; box-shadow: 0 0 16px rgba(255,50,50,0.18);
}

/* CONTENT BODY */
#c-body {
  padding: 110px 8vw 80px;
  max-width: 1200px; margin: 0 auto; width: 100%;
}

#c-body > * {
  opacity: 0; transform: translateY(18px);
  animation: cFadeIn .55s forwards;
}
#c-body > *:nth-child(1) { animation-delay: .05s; }
#c-body > *:nth-child(2) { animation-delay: .15s; }
#c-body > *:nth-child(3) { animation-delay: .25s; }
#c-body > *:nth-child(4) { animation-delay: .35s; }
#c-body > *:nth-child(5) { animation-delay: .45s; }
#c-body > *:nth-child(6) { animation-delay: .55s; }
@keyframes cFadeIn { to { opacity: 1; transform: translateY(0); } }

/* ═══════════════════════════════════════════
   REUSABLE CONTENT COMPONENTS
═══════════════════════════════════════════ */

/* Section label */
.sec-label {
  font-family: var(--font-d); font-size: 8px; letter-spacing: 4px;
  color: rgba(0,255,65,0.3); text-transform: uppercase;
  display: flex; align-items: center; gap: 12px;
  margin-bottom: 14px;
}
.sec-label::after {
  content: ''; flex: 1; height: 1px;
  background: linear-gradient(90deg, rgba(0,255,65,0.2), transparent);
}

/* Hex Card */
.hcard {
  background: rgba(2,10,2,0.85);
  border: 1px solid rgba(0,255,65,0.18);
  padding: 26px 30px; position: relative;
  transition: border-color .3s, transform .3s;
  clip-path: polygon(0 0, calc(100% - 14px) 0, 100% 14px, 100% 100%, 0 100%);
  margin-bottom: 18px;
}
.hcard::before {
  content: ''; position: absolute; top: 0; right: 0;
  width: 0; height: 0; border-style: solid;
  border-width: 0 14px 14px 0;
  border-color: transparent rgba(0,255,65,0.3) transparent transparent;
}
.hcard:hover { border-color: rgba(0,255,65,0.45); transform: translateX(5px); }
.hcard-title {
  font-family: var(--font-d); font-size: 12px; letter-spacing: 2px;
  color: var(--g); margin-bottom: 14px; text-transform: uppercase;
}
.hcard-title::before { content: '⬡ '; }

/* Grid layouts */
.g2 { display: grid; grid-template-columns: 1fr 1fr; gap: 18px; margin-bottom: 24px; }
.g3 { display: grid; grid-template-columns: repeat(3,1fr); gap: 16px; margin-bottom: 24px; }
.g4 { display: grid; grid-template-columns: repeat(4,1fr); gap: 14px; margin-bottom: 24px; }
.gauto { display: grid; grid-template-columns: repeat(auto-fit,minmax(260px,1fr)); gap: 18px; margin-bottom: 24px; }

/* Stat card */
.scard {
  background: rgba(2,10,2,0.85);
  border: 1px solid rgba(0,255,65,0.14);
  padding: 22px 18px; text-align: center;
  transition: border-color .3s, box-shadow .3s;
  clip-path: polygon(0 0, calc(100% - 12px) 0, 100% 12px, 100% 100%, 0 100%);
}
.scard:hover { border-color: var(--g2); box-shadow: 0 0 20px rgba(0,255,65,0.08); }
.scard-num {
  font-family: var(--font-d); font-size: 44px; font-weight: 900;
  color: var(--g); line-height: 1;
  text-shadow: 0 0 20px rgba(0,255,65,0.45);
}
.scard-label {
  font-size: 11px; letter-spacing: 2px; color: rgba(0,255,65,0.45);
  text-transform: uppercase; margin-top: 8px; line-height: 1.5;
}

/* Skill bars */
.skill-wrap { margin-bottom: 14px; }
.skill-top {
  display: flex; justify-content: space-between;
  font-family: var(--font-d); font-size: 9.5px; letter-spacing: 1.5px;
  color: rgba(0,255,65,0.5); text-transform: uppercase; margin-bottom: 6px;
}
.skill-track {
  height: 3px; background: rgba(0,255,65,0.08); position: relative; overflow: visible;
}
.skill-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--g3), var(--g));
  width: 0; transition: width 1.4s cubic-bezier(.16,1,.3,1);
  position: relative;
}
.skill-fill::after {
  content: ''; position: absolute; right: -1px; top: -4px;
  width: 10px; height: 10px; border-radius: 50%;
  background: var(--g); box-shadow: 0 0 8px var(--g), 0 0 16px rgba(0,255,65,0.5);
}

/* Tech tags */
.tags { display: flex; flex-wrap: wrap; gap: 8px; margin: 10px 0 18px; }
.tag {
  font-family: var(--font-d); font-size: 8px; letter-spacing: 1.5px;
  text-transform: uppercase; padding: 6px 12px;
  border: 1px solid rgba(0,255,65,0.2); color: rgba(0,255,65,0.5);
  background: rgba(0,255,65,0.025);
  clip-path: polygon(5px 0%,100% 0%,calc(100% - 5px) 100%,0% 100%);
  transition: all .2s;
}
.tag:hover { border-color: var(--g); color: var(--g); background: rgba(0,255,65,0.07); }
.tag.java { border-color: rgba(0,200,100,0.4); color: rgba(0,255,150,0.65); }

/* Info list */
.ilist { list-style: none; }
.iitem {
  display: flex; gap: 12px; align-items: flex-start;
  padding: 10px 0; border-bottom: 1px solid rgba(0,255,65,0.06);
  font-family: var(--font-b); font-size: 14px; color: rgba(0,255,65,0.65);
  line-height: 1.6;
}
.iitem::before { content: '▸'; color: var(--g); flex-shrink: 0; padding-top: 2px; font-size: 10px; }
.iitem a { color: var(--g); text-decoration: none; }
.iitem strong { color: var(--g); }

/* Score card */
.score-card {
  background: rgba(2,10,2,0.85);
  border: 1px solid rgba(0,255,65,0.14);
  padding: 22px 18px; text-align: center;
  transition: border-color .3s;
  position: relative; overflow: hidden;
}
.score-card:hover { border-color: rgba(0,255,65,0.4); }
.score-v {
  font-family: var(--font-d); font-size: 52px; font-weight: 900;
  color: var(--g); line-height: 1;
  text-shadow: 0 0 20px rgba(0,255,65,0.4);
}
.score-v.warn { color: #88ff44; text-shadow: 0 0 20px rgba(136,255,68,0.35); }
.score-v.med { color: #ffcc00; text-shadow: 0 0 20px rgba(255,204,0,0.35); }
.score-sub { font-size: 10px; letter-spacing: 1.5px; color: rgba(0,255,65,0.35); text-transform: uppercase; margin-top: 8px; line-height: 1.6; }

.bio-name {

}
.bio-role {
  font-family: var(--font-d); font-size: 9px; letter-spacing: 3px;
  color: rgba(0,255,65,0.4); text-transform: uppercase; margin-bottom: 14px;
}
.bio-p { font-size: 14px; color: rgba(0,255,65,0.58); line-height: 1.85; margin-bottom: 12px; }
.bio-p strong { color: var(--g); font-weight: 600; }

/* Cert badge */
.cert-badge {
  display: inline-flex; flex-direction: column; align-items: center;

}
.cert-score {
  font-family: var(--font-d); font-size: 28px; font-weight: 900;

/* Goal items */

<script>
/* ── CURSOR ─────────────────────────────────── */
const curD = document.getElementById('cur-d');
const curR = document.getElementById('cur-r');
let mx = 0, my = 0, rx = 0, ry = 0;
document.addEventListener('mousemove', e => { mx = e.clientX; my = e.clientY; });
(function animCur() {
  curD.style.left = mx + 'px'; curD.style.top = my + 'px';
  rx += (mx - rx) * 0.14; ry += (my - ry) * 0.14;
  curR.style.left = rx + 'px'; curR.style.top = ry + 'px';
  requestAnimationFrame(animCur);
})();
document.querySelectorAll('button, a').forEach(el => {
  el.addEventListener('mouseenter', () => {
    curR.style.width = '50px'; curR.style.height = '50px';
    curR.style.borderColor = 'rgba(0,255,65,0.9)';
  });
  el.addEventListener('mouseleave', () => {
    curR.style.width = '32px'; curR.style.height = '32px';
    curR.style.borderColor = 'rgba(0,255,65,0.6)';
  });
});

/* ── PARTICLES CANVAS ─────────────────────── */
const pcanvas = document.getElementById('pcanvas');
const pctx = pcanvas.getContext('2d');
let PW, PH, particles = [];
function resizeP() {
  PW = pcanvas.width = window.innerWidth;
  PH = pcanvas.height = window.innerHeight;
}
resizeP();
window.addEventListener('resize', () => { resizeP(); initP(); });
function initP() {
  particles = [];
  for (let i = 0; i < 60; i++) {
    particles.push({
      x: Math.random() * PW, y: Math.random() * PH,
      vx: (Math.random()-.5)*.35, vy: (Math.random()-.5)*.35,
      r: Math.random() * 1.2 + 0.4
    });
  }
}
initP();
(function drawP() {
  pctx.clearRect(0,0,PW,PH);
  for (let i = 0; i < particles.length; i++) {
    for (let j = i+1; j < particles.length; j++) {
      const dx = particles[i].x - particles[j].x;
      const dy = particles[i].y - particles[j].y;
      const d = Math.sqrt(dx*dx + dy*dy);
      if (d < 120) {
        pctx.beginPath();
        pctx.strokeStyle = `rgba(0,255,65,${(1-d/120)*0.09})`;
        pctx.lineWidth = 0.5;
        pctx.moveTo(particles[i].x, particles[i].y);
        pctx.lineTo(particles[j].x, particles[j].y);
        pctx.stroke();
      }
    }
    const p = particles[i];
    pctx.beginPath();
    pctx.arc(p.x, p.y, p.r, 0, Math.PI*2);
    pctx.fillStyle = 'rgba(0,255,65,0.35)';
    pctx.fill();
    p.x += p.vx; p.y += p.vy;
    if (p.x < 0 || p.x > PW) p.vx *= -1;
    if (p.y < 0 || p.y > PH) p.vy *= -1;
  }
  requestAnimationFrame(drawP);
})();

/* ── 3D PARALLAX ──────────────────────────── */
const omni = document.getElementById('omni3d');
document.addEventListener('mousemove', e => {
  const x = (e.clientX / window.innerWidth  - 0.5) * 2;
  const y = (e.clientY / window.innerHeight - 0.5) * 2;
  omni.style.transform =
    `perspective(900px) rotateX(${-y*10}deg) rotateY(${x*10}deg) translateZ(0)`;
});
document.addEventListener('mouseleave', () => {
  omni.style.transform = 'perspective(900px) rotateX(0deg) rotateY(0deg)';
});

/* ── HOVER ALIEN BUTTONS ──────────────────── */
const faceAlienName = document.getElementById('face-alien-name');
const watchFace = document.getElementById('watch-face');
document.querySelectorAll('.alien-btn').forEach(btn => {
  btn.addEventListener('mouseenter', () => {
    faceAlienName.textContent = btn.dataset.alien;
    faceAlienName.classList.add('lit');
  });
  btn.addEventListener('mouseleave', () => {
    faceAlienName.textContent = 'OMNITRIX';
    faceAlienName.classList.remove('lit');
  });
});

/* ── TRANSFORMATION + CONTENT DISPLAY ────── */
const overlay = document.getElementById('transform-overlay');

const tAlienName = document.getElementById('t-alien-name');
const selScreen = document.getElementById('sel-screen');
const contentScreen = document.getElementById('content-screen');
const cAlienLabel = document.getElementById('c-alien-label');
const cSectionTitle = document.getElementById('c-section-title');
const cBody = document.getElementById('c-body');

document.querySelectorAll('.alien-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    const section = btn.dataset.section;
    const alien = btn.dataset.alien;
    const title = btn.dataset.title;

    // Mega glow on watch face
    watchFace.classList.add('mega-glow');

    // Set overlay alien name
    tAlienName.textContent = '— ' + alien + ' —';

    // Trigger flash
    setTimeout(() => {
      overlay.classList.add('go');
    }, 100);

    // Switch to content after flash peak
    setTimeout(() => {
      selScreen.classList.add('hidden');
      watchFace.classList.remove('mega-glow');
      cAlienLabel.textContent = '⬡ ALIEN · ' + alien;
      cSectionTitle.textContent = title;
      cBody.innerHTML = buildContent(section);
      contentScreen.classList.remove('hidden');
      contentScreen.scrollTop = 0;
      // animate skill bars
      setTimeout(animateBars, 150);
    }, 900);

    // Remove overlay class so it can retrigger
    setTimeout(() => {
      overlay.classList.remove('go');
    }, 1700);
  });
});

/* ── DEACTIVATE ───────────────────────────── */
function deactivate() {
  // Red flash
  overlay.style.background = '#ff2222';
  setTimeout(() => {
    overlay.style.background = 'var(--g)';
  }, 800);
  tAlienName.textContent = '— DEACTIVATING —';
  document.querySelector('.hero-time').textContent = 'DEACTIVATED';
  overlay.classList.add('go');
  setTimeout(() => {
    contentScreen.classList.add('hidden');
    selScreen.classList.remove('hidden');
    document.querySelector('.hero-time').textContent = "IT'S HERO TIME!";
  }, 900);
  setTimeout(() => { overlay.classList.remove('go'); }, 1700);
}

/* ── ANIMATE SKILL BARS ───────────────────── */
function animateBars() {
  document.querySelectorAll('.skill-fill[data-w]').forEach(el => {
    el.style.width = el.dataset.w + '%';
